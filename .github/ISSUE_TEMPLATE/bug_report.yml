name: Bug Report
description: Report a problem in the landing page
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      placeholder: Describe the bug clearly
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: 1. Go to ...
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser / Device
      placeholder: Chrome 123 on macOS
